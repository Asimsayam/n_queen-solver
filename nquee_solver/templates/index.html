<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>♛ N-Queens Animated Solver</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(to right, #fbc2eb, #a6c1ee);
        margin: 0; padding: 0;
        display: flex; justify-content: center;
    }
    .container {
        width: 95%;
        max-width: 900px;
        margin: 40px auto;
        background: #fff;
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { text-align: center; color: #4a4a4a; margin-bottom: 20px; }
    label { font-weight: bold; }
    input, button {
        width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 15px;
        border-radius: 8px; border: 1px solid #ccc; font-size: 16px;
    }
    button { background-color: #4CAF50; color: white; font-weight: bold; cursor: pointer; transition:0.3s; }
    button:hover { background-color: #45a049; }
    .output { margin-top: 20px; max-height: 600px; overflow-y: auto; }
    .solution-card {
        margin-bottom: 25px; padding: 15px;
        border-radius: 10px; background: #f5f5f5;
        box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }
    .chessboard {
        display: grid; gap:2px; margin-bottom: 10px;
        grid-template-columns: repeat(var(--n), 40px);
    }
    .cell { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border-radius: 4px; }
    .cell.white { background-color: #f0d9b5; }
    .cell.black { background-color: #b58863; }
    .queen { color: red; font-size: 28px; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
    <h1>♛ N-Queens Animated Solver</h1>
    <label>Enter N (4-12 for animation):</label>
    <input type="number" id="N" value="8" min="4" max="12">
    <button onclick="solveNQueens()">Solve</button>

    <div id="output" class="output"></div>
</div>

<script>
let intervalId;

async function solveNQueens() {
    const N = parseInt(document.getElementById("N").value);
    const output = document.getElementById("output");
    output.innerHTML = "<em>Solving...</em>";

    clearInterval(intervalId);

    try {
        const response = await fetch("/solve_nqueens", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ N })
        });

        const data = await response.json();
        output.innerHTML = `<h2>Total Solutions: ${data.total_solutions}</h2>`;

        if (N > 12) {
            const note = document.createElement("p");
            note.innerHTML = "<em>For large N, only total solutions are displayed for performance.</em>";
            output.appendChild(note);
            return;
        }

        let solIndex = 0;

        const showNextSolution = () => {
            output.querySelectorAll(".solution-card").forEach(c => c.remove());
            const sol = data.solutions[solIndex];

            const card = document.createElement("div");
            card.className = "solution-card";
            card.innerHTML = `<h3>Solution ${solIndex+1}</h3>`;
            const boardDiv = document.createElement("div");
            boardDiv.className = "chessboard";
            boardDiv.style.setProperty('--n', N);

            // Create board cells
            for(let row=0; row<N; row++){
                for(let col=0; col<N; col++){
                    const cell = document.createElement("div");
                    cell.className = "cell "+((row+col)%2===0?"white":"black");
                    boardDiv.appendChild(cell);
                }
            }
            card.appendChild(boardDiv);
            output.appendChild(card);

            // Animate queens row by row
            let currentRow = 0;
            const placeQueenStep = () => {
                if(currentRow >= N) return;
                const col = sol[currentRow];
                const boardCells = boardDiv.children;
                const index = currentRow*N + col;
                const cell = boardCells[index];
                cell.classList.add("queen");
                cell.textContent = "♛"; // Red queen
                currentRow++;
                setTimeout(placeQueenStep, 300);
            }
            placeQueenStep();

            solIndex = (solIndex + 1) % data.solutions.length;
        }

        showNextSolution();
        intervalId = setInterval(showNextSolution, N*300 + 1000);

    } catch(err){
        output.innerHTML = `<span style="color:red;">Error: ${err}</span>`;
    }
}
</script>
</body>
</html>
